<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>OpenEMR — starting</title>
    <style>
        :root { color-scheme: light dark; }
        body {
            font-family: system-ui, Segoe UI, Roboto, sans-serif;
            margin: 0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(160deg, #0f172a 0%, #1e293b 100%);
            color: #e2e8f0;
        }
        .card {
            max-width: 28rem;
            padding: 2rem 2.25rem;
            border-radius: 12px;
            background: rgba(15, 23, 42, 0.85);
            border: 1px solid rgba(148, 163, 184, 0.25);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.45);
            text-align: center;
        }
        h1 { font-size: 1.25rem; font-weight: 600; margin: 0 0 0.5rem; }
        p { margin: 0 0 1rem; font-size: 0.95rem; line-height: 1.5; color: #94a3b8; }
        .timer {
            font-variant-numeric: tabular-nums;
            font-size: 2.75rem;
            font-weight: 700;
            letter-spacing: 0.05em;
            color: #38bdf8;
            margin: 1rem 0 1.25rem;
        }
        .hint { font-size: 0.8rem; color: #64748b; }
        .pulse {
            display: inline-block;
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #22c55e;
            margin-right: 8px;
            animation: pulse 1.5s ease-in-out infinite;
        }
        @keyframes pulse {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.5; transform: scale(0.85); }
        }
    </style>
</head>
<body>
    <div class="card">
        <h1><span class="pulse" aria-hidden="true"></span>Starting OpenEMR</h1>
        <p>The database or app is still coming online (common on first deploy or cold start). This page will refresh automatically.</p>
        <div class="timer" id="countdown" role="timer" aria-live="polite">05:00</div>
        <p class="hint">You can bookmark <code>/public/initializing.html</code> if the home page is slow to respond.</p>
    </div>
    <script>
(function () {
    var totalSeconds = 5 * 60;
    var el = document.getElementById('countdown');
    function tick() {
        var m = Math.floor(totalSeconds / 60);
        var s = totalSeconds % 60;
        el.textContent = String(m).padStart(2, '0') + ':' + String(s).padStart(2, '0');
        if (totalSeconds <= 0) {
            window.location.reload();
            return;
        }
        totalSeconds -= 1;
    }
    tick();
    setInterval(tick, 1000);

    function tryHome() {
        fetch('/', { method: 'GET', credentials: 'same-origin', redirect: 'manual' })
            .then(function (res) {
                if (res.status === 0 || res.type === 'opaqueredirect') {
                    window.location.href = '/';
                    return;
                }
                if (res.status === 200 || res.status === 302 || res.status === 301) {
                    window.location.href = '/';
                }
            })
            .catch(function () { /* still booting */ });
    }
    setInterval(tryHome, 4000);
    tryHome();
})();
    </script>
</body>
</html>
