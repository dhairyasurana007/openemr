# Render Blueprint — OpenEMR web + private MariaDB (internal DNS wired for you).
#
# ## Apply this (first time or switching from manual services)
#
# 1. Commit and push this file to the branch Render builds from (often `main`).
# 2. Dashboard → Blueprints → **New Blueprint** → select this GitHub/GitLab repo.
# 3. Render detects `render.yaml` at the repo root (or set **Blueprint Path** if you moved it).
# 4. Review the **preview**: it will create/update **two** services:
#    - `openemr-mysql` — private MariaDB (not on the public internet).
#    - `openemr-copilot-agent` — public web app (your Dockerfile).
# 5. **Create / update** the Blueprint. First apply can take several minutes (DB disk + image pull).
# 6. After deploy: open the web URL; bootstrap runs `openemr-auto-install.php` (no setup.php if env is correct).
#
# ## Names and regions
#
# - Edit **region** on both services if you do not use Oregon (web + DB must match).
# - Edit **name** under `web` to match an *existing* web service if you want the Blueprint to
#   adopt that service instead of creating a new one.
#
# ## Billing / plans
#
# - Private services need a **paid** instance type on Render (see Render pricing).
# - `plan: starter` must be valid for your workspace; change if the sync UI errors.
#
# ## Troubleshooting
#
# - `MYSQL_HOST` is injected as the **private hostname** of `openemr-mysql` (not a Docker Compose name).
# - If a previous manual deploy failed, clear the web service **persistent disk** (if any) or fix `sites/`.
# - See `contrib/render/render-openemr-bootstrap.sh` for MySQL wait / install order.

services:
  - type: pserv
    name: openemr-mysql
    runtime: image
    region: oregon
    plan: starter
    # Use library/ + patch tag — Render rejects some short tags (e.g. mariadb:11.8).
    image:
      url: docker.io/library/mariadb:11.8.6
    disk:
      name: mariadb-data
      mountPath: /var/lib/mysql
      sizeGB: 10
    envVars:
      - key: MYSQL_ROOT_PASSWORD
        generateValue: true
      - key: MYSQL_DATABASE
        value: openemr
      - key: MYSQL_USER
        value: openemr
      - key: MYSQL_PASSWORD
        generateValue: true

  - type: web
    name: openemr-copilot-agent
    runtime: docker
    region: oregon
    dockerfilePath: ./Dockerfile
    plan: starter
    healthCheckPath: /
    envVars:
      - key: PORT
        value: "80"
      - key: MYSQL_HOST
        fromService:
          name: openemr-mysql
          type: pserv
          property: host
      - key: MYSQL_PORT
        value: "3306"
      - key: MYSQL_ROOT_PASS
        fromService:
          name: openemr-mysql
          type: pserv
          envVarKey: MYSQL_ROOT_PASSWORD
      - key: MYSQL_USER
        value: openemr
      - key: MYSQL_PASS
        fromService:
          name: openemr-mysql
          type: pserv
          envVarKey: MYSQL_PASSWORD
      - key: MYSQL_DATABASE
        value: openemr
      - key: MANUAL_SETUP
        value: "no"
      # Set in Dashboard after first deploy if you need a fixed public OAuth URL.
      - key: OPENEMR_SETTING_site_addr_oath
        sync: false
      # Optional: set a strong initial OpenEMR admin password (otherwise default is weak).
      - key: OE_PASS
        sync: false
