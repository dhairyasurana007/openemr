# Deploy OpenEMR to Railway on pushes to the repository default branch.
#
# GitLab: Settings → CI/CD → Variables (mask RAILWAY_TOKEN):
#   RAILWAY_TOKEN (required)
#     Railway → your project → Settings → Tokens → create a project token.
#   RAILWAY_SERVICE_NAME (optional, default: openemr)
#   RAILWAY_ENVIRONMENT (optional, default: production)
#   RAILWAY_PROJECT_ID (optional)
#     UUID from the Railway project URL if `railway up` without it fails to resolve the project.

stages:
  - deploy

deploy_railway:
  stage: deploy
  image: ghcr.io/railwayapp/cli:latest
  rules:
    - if: '$CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH'
  script:
    - |
      set -e
      if [ -z "$RAILWAY_TOKEN" ]; then
        echo "Missing CI variable RAILWAY_TOKEN."
        echo "Create a project token in Railway (Project → Settings → Tokens) and add it in GitLab (Settings → CI/CD → Variables)."
        exit 1
      fi
      export RAILWAY_TOKEN
      SERVICE="${RAILWAY_SERVICE_NAME:-openemr}"
      ENV_NAME="${RAILWAY_ENVIRONMENT:-production}"
      if [ -n "$RAILWAY_PROJECT_ID" ]; then
        railway up --ci --project "$RAILWAY_PROJECT_ID" --environment "$ENV_NAME" --service "$SERVICE"
      else
        railway up --ci --environment "$ENV_NAME" --service "$SERVICE"
      fi
