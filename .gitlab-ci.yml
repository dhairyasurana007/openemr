stages:
  - build
  - deploy

variables:
  AWS_REGION: "us-east-1"
  CONTAINER_NAME: "OpenEMR Agent"
  ECR_REPOSITORY_NAME: "openemr-agent"
  LIGHTSAIL_DEPLOY_PATH: "/opt/openemr"
  LIGHTSAIL_INSTANCE_NAME: "OpenemrAgent"

build_image:
  stage: build
  image: docker:27
  services:
    - docker:27-dind
  variables:
    DOCKER_TLS_CERTDIR: "/certs"
    DOCKER_HOST: tcp://docker:2376
    DOCKER_TLS_VERIFY: "1"
    DOCKER_CERT_PATH: "$DOCKER_TLS_CERTDIR/client"
  script:
    - |
      set -e
      export AWS_ACCOUNT_ID="$(aws sts get-caller-identity --query Account --output text --region "$AWS_REGION")"
      export ECR_REGISTRY="${AWS_ACCOUNT_ID}.dkr.ecr.${AWS_REGION}.amazonaws.com"
      export IMAGE_URI="${ECR_REGISTRY}/${ECR_REPOSITORY_NAME}:${CI_COMMIT_SHA}"
      aws ecr describe-repositories --repository-names "$ECR_REPOSITORY_NAME" --region "$AWS_REGION" >/dev/null 2>&1 || aws ecr create-repository --repository-name "$ECR_REPOSITORY_NAME" --region "$AWS_REGION"
      aws ecr get-login-password --region "$AWS_REGION" | docker login --username AWS --password-stdin "$ECR_REGISTRY"
      docker build --label "container.name=${CONTAINER_NAME}" -t "$IMAGE_URI" -t "${ECR_REGISTRY}/${ECR_REPOSITORY_NAME}:latest" .
      docker push "$IMAGE_URI"
      docker push "${ECR_REGISTRY}/${ECR_REPOSITORY_NAME}:latest"
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'
  before_script:
    - apk add --no-cache aws-cli

deploy_lightsail:
  stage: deploy
  image: alpine:3.20
  before_script:
    - apk add --no-cache aws-cli openssh-client
  script:
    - |
      set -e
      test -n "$LIGHTSAIL_SSH_PRIVATE_KEY_B64" || { echo "Missing CI variable LIGHTSAIL_SSH_PRIVATE_KEY_B64"; exit 1; }
      test -n "$LIGHTSAIL_SSH_USER" || { echo "Missing CI variable LIGHTSAIL_SSH_USER"; exit 1; }
      export AWS_ACCOUNT_ID="$(aws sts get-caller-identity --query Account --output text --region "$AWS_REGION")"
      export ECR_REGISTRY="${AWS_ACCOUNT_ID}.dkr.ecr.${AWS_REGION}.amazonaws.com"
      export IMAGE_URI="${ECR_REGISTRY}/${ECR_REPOSITORY_NAME}:${CI_COMMIT_SHA}"
      export INSTANCE_STATE="$(aws lightsail get-instance --instance-name "$LIGHTSAIL_INSTANCE_NAME" --region "$AWS_REGION" --query 'instance.state.name' --output text 2>/dev/null || true)"
      if [ -z "$INSTANCE_STATE" ]; then
        echo "Lightsail instance '${LIGHTSAIL_INSTANCE_NAME}' was not found in ${AWS_REGION}."
        exit 1
      fi
      if [ "$INSTANCE_STATE" != "running" ]; then
        echo "Lightsail instance '${LIGHTSAIL_INSTANCE_NAME}' is '$INSTANCE_STATE' (must be 'running')."
        exit 1
      fi
      export LIGHTSAIL_HOST="$(aws lightsail get-instance --instance-name "$LIGHTSAIL_INSTANCE_NAME" --region "$AWS_REGION" --query 'instance.publicIpAddress' --output text)"
      mkdir -p ~/.ssh
      chmod 700 ~/.ssh
      echo "$LIGHTSAIL_SSH_PRIVATE_KEY_B64" | base64 -d > ~/.ssh/lightsail_id_rsa || { echo "Failed to decode LIGHTSAIL_SSH_PRIVATE_KEY_B64"; exit 1; }
      chmod 600 ~/.ssh/lightsail_id_rsa
      cat > /tmp/docker-compose.bootstrap.yml <<'EOF'
      services:
        openemr:
          image: ${IMAGE_URI}
          container_name: openemr-agent
          restart: unless-stopped
          ports:
            - "80:80"
            - "443:443"
          environment:
            - MYSQL_HOST=mysql
            - MYSQL_DATABASE=openemr
            - MYSQL_USER=openemr
            - MYSQL_PASS=openemr
            - OE_USER=admin
            - OE_PASS=pass
          depends_on:
            - mysql

        mysql:
          image: mariadb:11
          container_name: openemr-mysql
          restart: unless-stopped
          environment:
            - MYSQL_ROOT_PASSWORD=changeme-root
            - MYSQL_DATABASE=openemr
            - MYSQL_USER=openemr
            - MYSQL_PASSWORD=openemr
          volumes:
            - mysql_data:/var/lib/mysql

      volumes:
        mysql_data:
      EOF
      ssh -o StrictHostKeyChecking=no -i ~/.ssh/lightsail_id_rsa "$LIGHTSAIL_SSH_USER@$LIGHTSAIL_HOST" "mkdir -p $LIGHTSAIL_DEPLOY_PATH"
      if ! ssh -o StrictHostKeyChecking=no -i ~/.ssh/lightsail_id_rsa "$LIGHTSAIL_SSH_USER@$LIGHTSAIL_HOST" "test -f $LIGHTSAIL_DEPLOY_PATH/docker-compose.yml"; then
        scp -o StrictHostKeyChecking=no -i ~/.ssh/lightsail_id_rsa /tmp/docker-compose.bootstrap.yml "$LIGHTSAIL_SSH_USER@$LIGHTSAIL_HOST:$LIGHTSAIL_DEPLOY_PATH/docker-compose.yml"
      fi
      aws ecr get-login-password --region "$AWS_REGION" | ssh -o StrictHostKeyChecking=no -i ~/.ssh/lightsail_id_rsa "$LIGHTSAIL_SSH_USER@$LIGHTSAIL_HOST" "docker login --username AWS --password-stdin $ECR_REGISTRY"
      ssh -o StrictHostKeyChecking=no -i ~/.ssh/lightsail_id_rsa "$LIGHTSAIL_SSH_USER@$LIGHTSAIL_HOST" "cd $LIGHTSAIL_DEPLOY_PATH && export IMAGE_URI=$IMAGE_URI && docker compose pull && docker compose up -d"
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'
